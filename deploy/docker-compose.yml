services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hearth
      POSTGRES_USER: hearth
      POSTGRES_PASSWORD: hearth_dev
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth -d hearth"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  hearthd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HEARTH_DATABASE_URL: postgres://hearth:hearth_dev@db:5432/hearth?sslmode=disable
      HEARTH_JWT_SECRET: ${HEARTH_JWT_SECRET:?HEARTH_JWT_SECRET is required — set it to a random 32+ character string}
      HEARTH_LOG_LEVEL: info
      HEARTH_LOG_FORMAT: json
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
